{% extends 'base.html' %}

{% block title %}Sign In - Trekking Management Application{% endblock %}

{% block content %}
<div class="container">
    <div class="auth-wrap my-4">
        <div class="auth-card">
            <h3 class="text-center fw-bold mb-4">Login</h3>

            <form method="POST" action="{{ url_for('login') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="mb-3">
                    <input type="email" class="form-control" id="email" name="email"
                           placeholder="Email" required autofocus>
                </div>

                <div class="mb-3">
                    <input type="password" class="form-control" id="password" name="password"
                           placeholder="Password" required>
                </div>

                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" id="remember" name="remember" value="1" checked>
                    <label class="form-check-label small" for="remember">Remember me</label>
                </div>

                <div class="d-grid mb-3">
                    <button type="submit" class="btn btn-primary">Login</button>
                </div>

                <p class="text-center small text-muted mb-0">
                    Don't have an account?
                    <a href="{{ url_for('register') }}" class="text-decoration-none fw-semibold">Register here</a>
                </p>
            </form>
        </div>
    </div>
</div>
{% endblock %}
