{% extends 'dash_base.html' %}

{% block title %}Settings - Trekking Management Application{% endblock %}

{% block content %}
<h4 class="fw-bold mb-4">Settings</h4>

<div class="wf-card" style="max-width: 640px;">
    <div class="wf-card-header"><span>Account Settings</span></div>
    <div class="wf-card-body">
        <form method="POST" action="{{ url_for('admin_settings') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="mb-3">
                <label class="form-label small fw-semibold" for="full_name">Full Name</label>
                <input type="text" class="form-control" id="full_name" name="full_name"
                       value="{{ current_user.full_name }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label small fw-semibold" for="email">Email</label>
                <input type="email" class="form-control" id="email" name="email"
                       value="{{ current_user.email }}" required>
            </div>

            <div class="mb-4">
                <label class="form-label small fw-semibold" for="phone">Phone</label>
                <input type="tel" class="form-control" id="phone" name="phone"
                       value="{{ current_user.phone }}" required>
            </div>

            <hr>
            <p class="small text-muted mb-3">Change password (leave blank to keep the current one)</p>

            <div class="mb-3">
                <label class="form-label small fw-semibold" for="current_password">Current Password</label>
                <input type="password" class="form-control" id="current_password" name="current_password"
                       autocomplete="current-password">
            </div>

            <div class="mb-4">
                <label class="form-label small fw-semibold" for="new_password">New Password</label>
                <input type="password" class="form-control" id="new_password" name="new_password"
                       minlength="8" autocomplete="new-password">
            </div>

            <div class="d-flex justify-content-end">
                <button type="submit" class="btn btn-primary px-4">Save Changes</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
