{% extends 'dash_base.html' %}

{% block title %}{% if trek %}Edit Trek{% else %}Add New Trek{% endif %} - Trekking Management Application{% endblock %}

{% block content %}
<h4 class="fw-bold mb-4">{% if trek %}Edit Trek{% else %}Add New Trek{% endif %}</h4>

<!-- Two-column form layout (wireframe 5) -->
<div class="wf-card" style="max-width: 900px;">
    <div class="wf-card-body">
        <form method="POST"
              action="{% if trek %}{{ url_for('edit_trek', trek_id=trek.id) }}{% else %}{{ url_for('create_trek') }}{% endif %}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label small fw-semibold" for="trek_name">Trek Name</label>
                    <input type="text" class="form-control" id="trek_name" name="trek_name" required
                           value="{{ trek.trek_name if trek else '' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label small fw-semibold" for="start_date">Start Date</label>
                    <input type="date" class="form-control" id="start_date" name="start_date" required
                           value="{{ trek.start_date.strftime('%Y-%m-%d') if trek else '' }}">
                </div>

                <div class="col-md-6">
                    <label class="form-label small fw-semibold" for="location">Location</label>
                    <input type="text" class="form-control" id="location" name="location" required
                           value="{{ trek.location if trek else '' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label small fw-semibold" for="end_date">End Date</label>
                    <input type="date" class="form-control" id="end_date" name="end_date" required
                           value="{{ trek.end_date.strftime('%Y-%m-%d') if trek else '' }}">
                </div>

                <div class="col-md-6">
                    <label class="form-label small fw-semibold" for="difficulty">Difficulty</label>
                    <select class="form-select" id="difficulty" name="difficulty" required>
                        <option value="" {% if not trek %}selected{% endif %}>-- Select --</option>
                        {% for diff in ['Easy', 'Moderate', 'Hard'] %}
                        <option value="{{ diff }}" {% if trek and trek.difficulty == diff %}selected{% endif %}>{{ diff }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label small fw-semibold" for="assigned_staff_id">Assign Staff</label>
                    <select class="form-select" id="assigned_staff_id" name="assigned_staff_id">
                        <option value="">-- Select Staff --</option>
                        {% for staff in approved_staff %}
                        <option value="{{ staff.id }}"
                                {% if trek and trek.assigned_staff_id == staff.id %}selected{% endif %}>
                            {{ staff.full_name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label small fw-semibold" for="duration_days">Duration (Days)</label>
                    <input type="number" class="form-control" id="duration_days" name="duration_days" min="1" required
                           value="{{ trek.duration_days if trek else '' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label small fw-semibold" for="status">Status</label>
                    <select class="form-select" id="status" name="status" required>
                        {% for st in ['Pending', 'Open', 'Closed', 'Started', 'Completed'] %}
                        <option value="{{ st }}" {% if trek and trek.status == st %}selected{% endif %}>{{ st }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label small fw-semibold" for="available_slots">Available Slots</label>
                    <input type="number" class="form-control" id="available_slots" name="available_slots" min="0" required
                           value="{{ trek.available_slots if trek else '' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label small fw-semibold" for="description">Description</label>
                    <textarea class="form-control" id="description" name="description" rows="3">{{ trek.description if trek and trek.description else '' }}</textarea>
                </div>
            </div>

            <div class="d-flex justify-content-end gap-2 mt-4">
                <a href="{{ url_for('manage_treks') }}" class="btn btn-outline-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary px-4">Save</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
