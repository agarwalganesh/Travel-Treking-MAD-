{% extends 'base.html' %}

{% block title %}Register - Trekking Management Application{% endblock %}

{% block content %}
<div class="container">
    <div class="auth-wrap my-4">
        <div class="auth-card">
            <h3 class="text-center fw-bold mb-4">Register</h3>

            <form method="POST" action="{{ url_for('register') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="mb-3">
                    <input type="text" class="form-control" id="full_name" name="full_name"
                           placeholder="Full Name" required autofocus>
                </div>

                <div class="mb-3">
                    <input type="email" class="form-control" id="email" name="email"
                           placeholder="Email" required>
                </div>

                <div class="mb-3">
                    <input type="tel" class="form-control" id="phone" name="phone"
                           placeholder="Phone Number" pattern="[0-9]{10,15}" required>
                </div>

                <div class="mb-3">
                    <input type="password" class="form-control" id="password" name="password"
                           placeholder="Password" minlength="8" required>
                </div>

                <div class="mb-3">
                    <input type="password" class="form-control" id="confirm_password" name="confirm_password"
                           placeholder="Confirm Password" minlength="8" required>
                </div>

                <div class="mb-3 d-flex align-items-center gap-2">
                    <label for="role" class="form-label small text-muted mb-0 flex-shrink-0">I am a</label>
                    <select class="form-select" id="role" name="role" required>
                        <option value="" selected>-- Select Role --</option>
                        <option value="user">User (Trekker)</option>
                        <option value="staff">Trek Staff</option>
                    </select>
                </div>

                <!-- Extra contact info shown only for staff applications -->
                <div class="mb-3 d-none" id="staffExtra">
                    <textarea class="form-control" id="contact_details" name="contact_details" rows="2"
                              placeholder="Contact details / experience (for staff review)"></textarea>
                </div>

                <div class="d-grid mb-3">
                    <button type="submit" class="btn btn-primary">Register</button>
                </div>

                <p class="text-center small text-muted mb-0">
                    Already have an account?
                    <a href="{{ url_for('login') }}" class="text-decoration-none fw-semibold">Login here</a>
                </p>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    // Reveal the staff contact-details box only when the Staff role is chosen
    const roleSelect = document.getElementById('role');
    const staffExtra = document.getElementById('staffExtra');
    roleSelect.addEventListener('change', function () {
        staffExtra.classList.toggle('d-none', this.value !== 'staff');
    });
</script>
{% endblock %}
